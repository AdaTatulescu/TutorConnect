<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Schedule Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="mb-4">
            Schedule Session
        </h1>

        <form th:action="@{/schedule-session/{id}(id=${booking.id})}"
              th:object="${booking}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Student
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{studentName}"
                       readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Meditation
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{meditationTitle}"
                       readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Session Date
                </label>

                <input type="date"
                       class="form-control"
                       th:field="*{sessionDate}">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Session Time
                </label>

                <input type="time"
                       class="form-control"
                       th:field="*{sessionTime}">

            </div>

            <button type="submit"
                    class="btn btn-success">

                Confirm Session

            </button>

        </form>

    </div>

</div>

</body>
</html>
