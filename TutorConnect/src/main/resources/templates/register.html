<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h1 class="mb-4">
            Register
        </h1>

        <form th:action="@{/register}"
              th:object="${user}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Name
                </label>

                <input type="text"
                       th:field="*{name}"
                       class="form-control"
                       placeholder="Enter your name">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                       th:field="*{email}"
                       class="form-control"
                       placeholder="Enter your email">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       th:field="*{password}"
                       class="form-control"
                       placeholder="Enter password">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Role
                </label>

                <select th:field="*{role}"
                        class="form-select">

                    <option value="CURSANT">
                        CURSANT
                    </option>

                    <option value="MEDITATOR">
                        MEDITATOR
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Register

            </button>

            <a href="/login"
               class="btn btn-secondary">

                Login

            </a>

        </form>

    </div>

</div>

</body>
</html>
