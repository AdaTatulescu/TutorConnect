<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h1 class="mb-4">
            Login
        </h1>

        <form method="post"
              th:action="@{/login}">

            <div class="mb-3">

                <label>Email</label>

                <input type="text"
                       name="username"
                       class="form-control">

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control">

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
