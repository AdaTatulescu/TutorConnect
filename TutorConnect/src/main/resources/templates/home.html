<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>TutorConnect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
        }

        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
        }

        .hero-title {
            font-size: 70px;
            font-weight: 700;
            color: #111111;
        }

        .hero-text {
            font-size: 22px;
            color: #6c757d;
            line-height: 1.7;
        }

        .hero-image {
            width: 100%;
            border-radius: 25px;
        }

        .category-card {
            transition: 0.3s;
            cursor: pointer;
            border-radius: 20px;
        }

        .category-card:hover {
            transform: translateY(-8px);
        }

        .gold-text {
            color: #f5c76b;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow"
     style="background-color: #111111; padding: 18px 0;">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/"
           style="font-size: 30px; color: #f5c76b;">

            TutorConnect

        </a>

        <div class="d-flex align-items-center gap-3">

            <a href="/"
               class="btn btn-outline-light btn-sm">

                Home
            </a>

            <a href="/login"
               class="btn btn-outline-light btn-sm">

                Login
            </a>

            <a href="/register"
               class="btn btn-warning btn-sm">

                Register
            </a>

        </div>

    </div>

</nav>

<section class="hero">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-lg-6">

                <h1 class="hero-title mb-4">

                    Find the Perfect Tutor

                </h1>

                <p class="hero-text mb-4">

                    Connect with experienced tutors for mathematics,
                    programming, physics, languages and much more.

                </p>

                <a href="/meditations"
                   class="btn btn-warning btn-lg me-3">

                    Browse Tutors

                </a>

                <a href="/register"
                   class="btn btn-dark btn-lg">

                    Join Now

                </a>

            </div>

            <div class="col-lg-6">

                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"
                     class="hero-image shadow">

            </div>

        </div>

    </div>

</section>

<section class="pb-5">

    <div class="container">

        <h2 class="text-center mb-5 fw-bold">

            Popular Categories

        </h2>

        <div class="row g-4">

            <div class="col-md-3">

                <div class="card shadow border-0 p-4 text-center category-card">

                    <h4 class="gold-text">
                        Mathematics
                    </h4>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow border-0 p-4 text-center category-card">

                    <h4 class="gold-text">
                        Programming
                    </h4>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow border-0 p-4 text-center category-card">

                    <h4 class="gold-text">
                        Physics
                    </h4>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card shadow border-0 p-4 text-center category-card">

                    <h4 class="gold-text">
                        English
                    </h4>

                </div>

            </div>

        </div>

    </div>

</section>

<footer class="text-white text-center p-4 mt-5"
        style="background-color: #111111;">

    TutorConnect © 2026

</footer>

</body>

</html>
