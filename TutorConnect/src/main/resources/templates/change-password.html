<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Change Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="mb-4 text-center">
            Change Password
        </h1>

        <div th:if="${success}"
             class="alert alert-success text-center">

            <span th:text="${success}">
            </span>

        </div>

        <div th:if="${error}"
             class="alert alert-danger text-center">

            <span th:text="${error}">
            </span>

        </div>

        <form th:action="@{/change-password}"
              th:object="${passwordDto}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Old Password
                </label>

                <input type="password"
                       class="form-control"
                       th:field="*{oldPassword}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    New Password
                </label>

                <input type="password"
                       class="form-control"
                       th:field="*{newPassword}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Confirm New Password
                </label>

                <input type="password"
                       class="form-control"
                       th:field="*{confirmPassword}"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Change Password

            </button>

            <a href="/my-profile"
               class="btn btn-secondary">

                Back
            </a>

        </form>

    </div>

</div>

</body>

</html>
