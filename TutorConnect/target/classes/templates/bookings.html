<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Bookings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
        }

        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }

        .badge-status {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

    </style>

</head>

<body class="bg-light">

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5 mb-5">

    <div class="table-container shadow">

        <div class="p-4 bg-primary text-white">

            <h1 class="mb-0">
                Received Requests
            </h1>

        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-light">

                <tr>

                    <th>ID</th>

                    <th>Student</th>

                    <th>Meditation</th>

                    <th>Subject</th>

                    <th>Level</th>

                    <th>Preferred Day</th>

                    <th>Preferred Time</th>

                    <th>Status</th>

                    <th>Session Date</th>

                    <th>Session Time</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="booking : ${bookings}">

                    <td th:text="${booking.id}">
                    </td>

                    <td th:text="${booking.studentName}">
                    </td>

                    <td th:text="${booking.meditationTitle}">
                    </td>

                    <td th:text="${booking.subject}">
                    </td>

                    <td th:text="${booking.level}">
                    </td>

                    <td th:text="${booking.preferredDay}">
                    </td>

                    <td th:text="${booking.preferredTime}">
                    </td>

                    <td>

                        <span th:if="${booking.status == 'PENDING'}"
                              class="badge bg-warning text-dark badge-status">

                            Pending
                        </span>

                        <span th:if="${booking.status == 'ACCEPTED'}"
                              class="badge bg-success badge-status">

                            Accepted
                        </span>

                        <span th:if="${booking.status == 'REJECTED'}"
                              class="badge bg-danger badge-status">

                            Rejected
                        </span>

                    </td>

                    <td th:text="${booking.sessionDate}">
                    </td>

                    <td th:text="${booking.sessionTime}">
                    </td>

                    <td>

                        <div th:if="${booking.tutorName == loggedUser and booking.status == 'PENDING'}">

                            <a th:href="@{/schedule-session/{id}(id=${booking.id})}"
                               class="btn btn-success btn-sm mb-1">

                                Schedule
                            </a>

                            <a th:href="@{/reject-booking/{id}(id=${booking.id})}"
                               class="btn btn-danger btn-sm">

                                Reject
                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
