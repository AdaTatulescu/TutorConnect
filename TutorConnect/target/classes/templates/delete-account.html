<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Delete Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 border-danger">

        <h1 class="text-danger mb-4">
            Delete Account
        </h1>

        <div class="alert alert-warning">

            This action is permanent and cannot be undone!

        </div>

        <div th:if="${error}"
             class="alert alert-danger">

            <span th:text="${error}">
            </span>

        </div>

        <form th:action="@{/delete-account}"
              th:object="${deleteDto}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Confirm Password
                </label>

                <input type="password"
                       class="form-control"
                       th:field="*{password}"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-danger">

                Delete My Account

            </button>

            <a href="/my-profile"
               class="btn btn-secondary">

                Cancel
            </a>

        </form>

    </div>

</div>

</body>

</html>
