<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
        }

        .profile-card {
            border: none;
            border-radius: 20px;
        }

    </style>

</head>

<body class="bg-light">

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5 mb-5">

    <div class="card shadow profile-card p-4">

        <h1 class="mb-4 text-center">
            My Profile
        </h1>

        <div th:if="${success}"
             class="alert alert-success text-center">

            <span th:text="${success}">
            </span>

        </div>

        <div class="text-center mb-4">

            <img th:if="${user.profileImage != null and user.profileImage != ''}"
                 th:src="${user.profileImage}"
                 class="rounded-circle shadow"
                 width="170"
                 height="170"
                 style="object-fit: cover; border: 4px solid #0d6efd;">

            <div th:if="${user.profileImage == null or user.profileImage == ''}"
                 class="text-muted">

                No profile picture selected.

            </div>

        </div>

        <form th:action="@{/update-profile}"
              th:object="${user}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div class="mb-3">

                <label class="form-label">
                    Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                       class="form-control"
                       th:field="*{email}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Profile Image URL
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{profileImage}"
                       placeholder="https://example.com/photo.jpg">

            </div>

            <div th:if="${user.role == 'MEDITATOR'}">

                <hr>

                <h3 class="mb-3 text-primary">
                    Tutor Information
                </h3>

                <div class="mb-3">

                    <label class="form-label">
                        Studies
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{studies}"
                           placeholder="Example: Faculty of Mathematics">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Experience
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{experience}"
                           placeholder="Example: 2 years tutoring">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Short Description
                    </label>

                    <textarea class="form-control"
                              th:field="*{description}"
                              rows="5"
                              placeholder="Write a short description about yourself"></textarea>

                </div>

            </div>

            <div class="mt-4 d-flex gap-2 flex-wrap">

                <button type="submit"
                        class="btn btn-primary">

                    Save Profile
                </button>

                <a href="/change-password"
                   class="btn btn-warning">

                    Change Password
                </a>

                <a href="/meditations"
                   class="btn btn-secondary">

                    Back
                </a>

            </div>

        </form>

        <hr class="mt-4">

        <form th:action="@{/logout}"
              method="post"
              class="mb-3">

            <button type="submit"
                    class="btn btn-danger w-100">

                Logout
            </button>

        </form>

        <a href="/delete-account"
           class="btn btn-outline-danger w-100">

            Delete Account
        </a>

    </div>

</div>

</body>

</html>
