<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Request Session</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="mb-4">
            Request Session
        </h1>

        <form th:action="@{/request-session}"
              th:object="${booking}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Tutor
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{tutorName}"
                       readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Meditation
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{meditationTitle}"
                       readonly>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Subject
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{subject}"
                       placeholder="Enter subject">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Level
                </label>

                <select class="form-select"
                        th:field="*{level}">

                    <option value="Beginner">
                        Beginner
                    </option>

                    <option value="Intermediate">
                        Intermediate
                    </option>

                    <option value="Advanced">
                        Advanced
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Message
                </label>

                <textarea class="form-control"
                          th:field="*{message}"
                          placeholder="Describe what you need help with">
                </textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Preferred Day
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{preferredDay}"
                       placeholder="Example: Monday">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Preferred Time
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{preferredTime}"
                       placeholder="Example: 18:00">

            </div>

            <button type="submit"
                    class="btn btn-primary">

                Send Request

            </button>

        </form>

    </div>

</div>

</body>
</html>
