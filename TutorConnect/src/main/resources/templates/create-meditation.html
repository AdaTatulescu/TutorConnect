<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Create Meditation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="mb-4">
            Create Meditation
        </h1>

        <form th:action="@{/create-meditation}"
              th:object="${meditation}"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Title
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{title}">
            </div>

            <div class="mb-3">

                <label class="form-label">
                    Subject
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{subject}">
            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea class="form-control"
                          th:field="*{description}">
                </textarea>
            </div>

            <div class="mb-3">

                <label class="form-label">
                    Price
                </label>

                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{price}">
            </div>

            <div class="mb-3">

                <label class="form-label">
                    Tutor Name
                </label>

                <input type="text"
                       class="form-control"
                       th:field="*{tutorName}">
            </div>

            <button type="submit"
                    class="btn btn-primary">

                Create
            </button>

        </form>

    </div>

</div>

</body>
</html>
