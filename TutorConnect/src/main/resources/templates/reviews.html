<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Reviews</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Reviews
    </h1>

    <a href="/add-review"
       class="btn btn-success mb-4">

        Add Review
    </a>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="review : ${reviews}">

            <div class="card shadow h-100">

                <div class="card-body">

                    <h4>
                        Tutor:
                        <span th:text="${review.tutorName}">
                        </span>
                    </h4>

                    <p>
                        <strong>Student:</strong>

                        <span th:text="${review.studentName}">
                        </span>
                    </p>

                    <p>
                        <strong>Rating:</strong>

                        <span th:text="${review.rating}">
                        </span>
                        / 5
                    </p>

                    <p th:text="${review.comment}">
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
