<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Tutors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
        }

        .card {
            border: none;
            border-radius: 20px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .profile-img {
            width: 95px;
            height: 95px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #0d6efd;
        }

        .page-title {
            font-size: 55px;
            font-weight: 700;
        }

        .search-box {
            border-radius: 15px;
            padding: 15px;
        }

        .price {
            font-size: 35px;
            font-weight: 600;
            color: #198754;
        }

    </style>

</head>

<body class="bg-light">

<div th:replace="navbar :: navbar"></div>

<div class="container mt-5 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <!-- CURSANT -->
            <div th:if="${#authorization.expression('hasAuthority(''CURSANT'')')}">

                <h1 class="page-title">
                    Find Tutors
                </h1>

                <p class="text-muted">

                    Browse experienced tutors and request sessions easily.

                </p>

            </div>

            <!-- MEDITATOR -->
            <div th:if="${#authorization.expression('hasAuthority(''MEDITATOR'')')}">

                <h1 class="page-title">
                    My Meditations
                </h1>

                <p class="text-muted">

                    Manage your meditations and student requests.

                </p>

            </div>

        </div>

        <div th:if="${#authorization.expression('hasAuthority(''MEDITATOR'')')}">

            <a href="/create-meditation"
               class="btn btn-success btn-lg">

                Add Meditation
            </a>

        </div>

    </div>

    <!-- SEARCH doar pentru cursanti -->
    <div th:if="${#authorization.expression('hasAuthority(''CURSANT'')')}">

        <form th:action="@{/search-meditations}"
              method="get"
              class="mb-5">

            <div class="row g-3">

                <div class="col-md-10">

                    <input type="text"
                           name="subject"
                           class="form-control form-control-lg search-box"
                           placeholder="Search by subject...">

                </div>

                <div class="col-md-2">

                    <button type="submit"
                            class="btn btn-primary btn-lg w-100 h-100">

                        Search
                    </button>

                </div>

            </div>

        </form>

    </div>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="meditation : ${meditations}">

            <div class="card shadow h-100">

                <div class="card-body text-center p-4">

                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                         class="profile-img mb-3">

                    <h3 class="fw-bold"
                        th:text="${meditation.tutorName}">
                    </h3>

                    <h5 class="text-primary mb-3"
                        th:text="${meditation.subject}">
                    </h5>

                    <p class="text-muted"
                       th:text="${meditation.description}">
                    </p>

                    <div class="price mb-4">

                        <span th:text="${meditation.price}">
                        </span>
                        RON

                    </div>

                    <!-- CURSANT -->
                    <div th:if="${#authorization.expression('hasAuthority(''CURSANT'')')}">

                        <a th:href="@{/tutor-profile/{id}(id=${meditation.userId})}"
                           class="btn btn-outline-primary mb-2 w-100">

                            View Tutor Profile
                        </a>

                        <a th:href="@{/request-session/{id}(id=${meditation.id})}"
                           class="btn btn-primary w-100">

                            Request Session
                        </a>

                    </div>

                    <!-- MEDITATOR -->
                    <div th:if="${#authorization.expression('hasAuthority(''MEDITATOR'')')}">

                        <a th:href="@{/edit-meditation/{id}(id=${meditation.id})}"
                           class="btn btn-warning w-100 mb-2">

                            Edit
                        </a>

                        <a th:href="@{/delete-meditation/{id}(id=${meditation.id})}"
                           class="btn btn-danger w-100">

                            Delete
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
